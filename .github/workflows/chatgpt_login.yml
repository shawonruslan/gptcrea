name: ChatGPT Bulk Wallpaper Generation

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Allows the workflow to push changes back to the repository

jobs:
  run-playwright:
    name: Generate Wallpapers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create wallpapers directory
        run: mkdir -p wallpapers

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers with dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Bulk Wallpaper Generation Script
        run: node login.js

      - name: Upload Wallpapers Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chatgpt-generated-wallpapers
          path: |
            wallpapers/
            emails.txt
          retention-days: 5

      - name: Commit and Push Updated Email List
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid conflicts in case of other changes
          git pull origin main --rebase || echo "No rebase needed"
          
          if [ -f emails.txt ]; then
            git add emails.txt
            git commit -m "docs: update signed up emails list [skip ci]" && git push || echo "No changes to commit"
          fi
